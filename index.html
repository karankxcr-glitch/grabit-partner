<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grabit Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Poppins', system_ui, sans-serif; font-weight: 600; letter-spacing: -0.025em; }
        .pin-input { width: 48px; height: 56px; text-align: center; font-size: 1.6rem; font-weight: 700; border: 2px solid #d1d5db; border-radius: 12px; background: white; }
        .pin-input:focus { border-color: #10b981; outline: none; }
        .inventory-card { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-zinc-50">
    <!-- Auth Screen -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="flex justify-center mb-8">
                <div class="flex items-center gap-x-3">
                    <div class="w-14 h-14 bg-emerald-600 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-bolt text-white text-4xl"></i>
                    </div>
                    <div>
                        <h1 class="logo-font text-5xl font-bold tracking-tighter text-emerald-700">Grabit</h1>
                        <p class="text-emerald-600 text-sm font-medium -mt-1">PARTNER</p>
                    </div>
                </div>
            </div>

            <!-- Login Card -->
            <div id="login-card" class="bg-white rounded-3xl shadow-xl p-8 border border-zinc-100">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-semibold">Welcome Back</h2>
                    <p class="text-zinc-500 mt-1">Login with your 6-digit M-Pin</p>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-zinc-700 mb-2">Enter your 6-digit M-Pin</label>
                    <div class="flex justify-center gap-2" id="login-pin-inputs"></div>
                </div>

                <button onclick="loginWithMPin()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl">
                    Login
                </button>

                <div class="text-center mt-6">
                    <button onclick="showSignupScreen()" class="text-emerald-600 hover:text-emerald-700 text-sm font-medium">
                        New store? Create Account →
                    </button>
                </div>
            </div>

            <!-- Signup Card -->
            <div id="signup-card" class="hidden bg-white rounded-3xl shadow-xl p-8 border border-zinc-100">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-semibold">Create Account</h2>
                    <p class="text-zinc-500 mt-1">First time? Set up your store</p>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-zinc-700 mb-1.5">Store Name</label>
                        <input id="signup-store-name" type="text" value="Sharma Kirana Store"
                               class="w-full px-4 py-3.5 bg-zinc-50 border border-zinc-200 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-zinc-700 mb-1.5">Area / Locality</label>
                        <input id="signup-area" type="text" value="Indirapuram, Ghaziabad"
                               class="w-full px-4 py-3.5 bg-zinc-50 border border-zinc-200 rounded-2xl">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-zinc-700 mb-2">Create 6-digit M-Pin</label>
                        <div class="flex justify-center gap-2 mb-2" id="signup-pin-inputs"></div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-zinc-700 mb-2">Confirm M-Pin</label>
                        <div class="flex justify-center gap-2" id="confirm-pin-inputs"></div>
                    </div>
                </div>

                <button onclick="createAccountWithMPin()" 
                        class="mt-8 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl">
                    Create Account &amp; Login
                </button>

                <div class="text-center mt-4">
                    <button onclick="showLoginScreen()" class="text-sm text-zinc-500">Already have an account? Login</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden min-h-screen bg-zinc-50 pb-20">
        <!-- Header -->
        <div class="bg-white border-b sticky top-0 z-50">
            <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="flex items-center gap-x-2.5">
                        <div class="w-9 h-9 bg-emerald-600 rounded-xl flex items-center justify-center">
                            <i class="fa-solid fa-bolt text-white text-2xl"></i>
                        </div>
                        <span class="logo-font text-3xl font-bold text-emerald-700">Grabit</span>
                    </div>
                </div>
                <div class="flex items-center gap-x-3">
                    <div class="text-right">
                        <div id="header-store-name" class="font-semibold text-sm"></div>
                        <div id="header-area" class="text-xs text-zinc-500"></div>
                    </div>
                    <div onclick="showProfile()" class="w-9 h-9 bg-emerald-100 rounded-full flex items-center justify-center cursor-pointer">
                        <i class="fa-solid fa-store text-emerald-600"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-5xl mx-auto px-4 pt-6">
            <!-- Stats -->
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="bg-white border rounded-3xl p-4">
                    <div class="text-xs text-zinc-500">Total Items</div>
                    <div id="stat-total" class="text-3xl font-bold text-emerald-700 mt-1">0</div>
                </div>
                <div class="bg-white border rounded-3xl p-4">
                    <div class="text-xs text-zinc-500">Low Stock</div>
                    <div id="stat-low" class="text-3xl font-bold text-red-500 mt-1">0</div>
                </div>
                <div class="bg-white border rounded-3xl p-4">
                    <div class="text-xs text-zinc-500">Last Updated</div>
                    <div id="stat-updated" class="text-sm font-semibold text-emerald-700 mt-1">Just now</div>
                </div>
            </div>

            <!-- Search -->
            <div class="relative mb-5">
                <i class="fa-solid fa-search absolute left-5 top-4 text-zinc-400"></i>
                <input id="search-input" type="text" placeholder="Search items..." onkeyup="filterInventory()"
                       class="w-full bg-white border pl-12 py-3.5 rounded-3xl">
            </div>

            <!-- Inventory Header -->
            <div class="flex justify-between items-center mb-3 px-1">
                <div class="font-semibold text-lg">Your Inventory</div>
                <button onclick="showAddModal()" class="flex items-center gap-x-2 text-emerald-600 text-sm font-medium">
                    <i class="fa-solid fa-plus"></i> <span>Add Item</span>
                </button>
            </div>

            <!-- Inventory Grid -->
            <div id="inventory-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 pb-8"></div>
        </div>

        <!-- FAB -->
        <button onclick="showAddModal()" class="fixed bottom-6 right-6 w-14 h-14 bg-emerald-600 text-white rounded-2xl flex items-center justify-center text-3xl shadow-xl">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- Add/Edit Modal -->
    <div id="item-modal" onclick="if (event.target.id === 'item-modal') hideModal()" class="hidden fixed inset-0 bg-black/60 z-[60] flex items-end md:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-white w-full md:w-[420px] md:rounded-3xl rounded-t-3xl p-6">
            <div class="flex justify-between mb-5">
                <h3 id="modal-title" class="text-xl font-semibold">Add New Item</h3>
                <button onclick="hideModal()" class="text-3xl">×</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-sm font-medium mb-1 block">Category</label>
                    <select id="modal-category" class="w-full border rounded-2xl px-4 py-3">
                        <option value="Staples">Staples</option>
                        <option value="Dairy">Dairy & Eggs</option>
                        <option value="Snacks">Snacks</option>
                        <option value="Beverages">Beverages</option>
                        <option value="Personal Care">Personal Care</option>
                        <option value="Household">Household</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm font-medium mb-1 block">Item Name</label>
                    <input id="modal-name" type="text" class="w-full border rounded-2xl px-4 py-3">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm font-medium mb-1 block">Quantity</label>
                        <div class="flex">
                            <input id="modal-qty" type="number" value="10" class="flex-1 border rounded-l-2xl px-4 py-3">
                            <select id="modal-unit" class="border rounded-r-2xl px-3">
                                <option value="pcs">pcs</option>
                                <option value="kg">kg</option>
                                <option value="L">L</option>
                                <option value="pack">pack</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-sm font-medium mb-1 block">Price (₹)</label>
                        <input id="modal-price" type="number" value="45" class="w-full border rounded-2xl px-4 py-3">
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mt-7">
                <button onclick="hideModal()" class="flex-1 py-3 rounded-2xl border">Cancel</button>
                <button onclick="saveNewItem()" id="modal-save-btn" class="flex-1 py-3 rounded-2xl bg-emerald-600 text-white font-semibold">Save</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
         const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentStore = null;
        let inventory = [];

        // ==================== PIN HELPER ====================
        function createPinInputs(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const input = document.createElement('input');
                input.type = 'password';
                input.maxLength = 1;
                input.className = 'pin-input';
                input.addEventListener('input', () => {
                    if (input.value && i < 5) container.children[i + 1].focus();
                });
                container.appendChild(input);
            }
        }

        function getPinValue(containerId) {
            const inputs = document.getElementById(containerId).querySelectorAll('input');
            return Array.from(inputs).map(i => i.value).join('');
        }

        // ==================== AUTH FLOW ====================
        function showLoginScreen() {
            document.getElementById('signup-card').classList.add('hidden');
            document.getElementById('login-card').classList.remove('hidden');
            createPinInputs('login-pin-inputs');
        }

        function showSignupScreen() {
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('signup-card').classList.remove('hidden');
            createPinInputs('signup-pin-inputs');
            createPinInputs('confirm-pin-inputs');
        }

        async function createAccountWithMPin() {
            const storeName = document.getElementById('signup-store-name').value.trim();
            const area = document.getElementById('signup-area').value.trim();
            const mpin = getPinValue('signup-pin-inputs');
            const confirmMpin = getPinValue('confirm-pin-inputs');

            if (!storeName || !area) {
                alert("Please fill Store Name and Area");
                return;
            }
            if (mpin.length !== 6 || confirmMpin.length !== 6) {
                alert("Please enter 6-digit M-Pin in both fields");
                return;
            }
            if (mpin !== confirmMpin) {
                alert("M-Pin does not match");
                return;
            }

            try {
                const docRef = await db.collection('stores').add({
                    storeName: storeName,
                    area: area,
                    mpin: mpin,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                currentStore = {
                    id: docRef.id,
                    storeName: storeName,
                    area: area,
                    mpin: mpin
                };

                localStorage.setItem('grabit_current_store', JSON.stringify(currentStore));
                
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                initMainApp();
            } catch (error) {
                console.error(error);
                alert("Failed to create account. Please try again.");
            }
        }

        async function loginWithMPin() {
            const mpin = getPinValue('login-pin-inputs');
            
            if (mpin.length !== 6) {
                alert("Please enter your 6-digit M-Pin");
                return;
            }

            try {
                const snapshot = await db.collection('stores').where('mpin', '==', mpin).get();
                
                if (snapshot.empty) {
                    alert("Invalid M-Pin. Please try again or create a new account.");
                    return;
                }

                const doc = snapshot.docs[0];
                currentStore = {
                    id: doc.id,
                    ...doc.data()
                };

                localStorage.setItem('grabit_current_store', JSON.stringify(currentStore));

                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                initMainApp();
            } catch (error) {
                console.error(error);
                alert("Login failed. Please try again.");
            }
        }

        // ==================== MAIN APP ====================
        function initMainApp() {
            if (!currentStore) return;

            document.getElementById('header-store-name').innerText = currentStore.storeName;
            document.getElementById('header-area').innerText = currentStore.area;

            loadInventory();
        }

        async function loadInventory() {
            if (!currentStore) return;

            try {
                const snapshot = await db.collection('inventory')
                    .where('storeId', '==', currentStore.id)
                    .orderBy('lastUpdated', 'desc')
                    .get();

                inventory = [];
                snapshot.forEach(doc => {
                    inventory.push({ id: doc.id, ...doc.data() });
                });

                renderInventory();
                updateStats();
            } catch (error) {
                console.error("Error loading inventory:", error);
            }
        }

        function renderInventory(filteredItems = null) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            let items = filteredItems || inventory;

            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            if (searchTerm) {
                items = items.filter(item => 
                    item.name.toLowerCase().includes(searchTerm) || 
                    item.category.toLowerCase().includes(searchTerm)
                );
            }

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-8 text-zinc-400">No items found</div>`;
                return;
            }

            items.forEach(item => {
                const isLow = item.qty <= (item.threshold || 5);
                const card = document.createElement('div');
                card.className = `inventory-card bg-white border rounded-3xl p-4 ${isLow ? 'border-red-300' : 'border-zinc-200'}`;

                card.innerHTML = `
                    <div class="flex justify-between mb-3">
                        <div>
                            <div class="font-semibold">${item.name}</div>
                            <div class="text-xs text-zinc-500">${item.category}</div>
                        </div>
                        ${isLow ? `<div class="px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded-full">LOW</div>` : ''}
                    </div>
                    <div class="flex items-baseline gap-1">
                        <span class="text-3xl font-bold text-emerald-700">${item.qty}</span>
                        <span class="text-sm text-zinc-500">${item.unit}</span>
                    </div>
                    <div class="mt-3 flex justify-between items-center">
                        <div class="text-xs text-zinc-400">${item.price ? '₹' + item.price : ''}</div>
                        <div class="flex gap-1">
                            <button onclick="event.stopImmediatePropagation(); adjustQuantity('${item.id}', -1)" class="w-8 h-8 bg-zinc-100 rounded-xl flex items-center justify-center">-</button>
                            <button onclick="event.stopImmediatePropagation(); adjustQuantity('${item.id}', 1)" class="w-8 h-8 bg-emerald-100 text-emerald-700 rounded-xl flex items-center justify-center">+</button>
                            <button onclick="event.stopImmediatePropagation(); editItem('${item.id}')" class="px-3 text-xs text-emerald-600">Edit</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterInventory() {
            renderInventory();
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = inventory.length;
            const lowStock = inventory.filter(i => i.qty <= (i.threshold || 5)).length;
            document.getElementById('stat-low').innerText = lowStock;
        }

        async function adjustQuantity(id, delta) {
            const itemIndex = inventory.findIndex(i => i.id === id);
            if (itemIndex === -1) return;

            inventory[itemIndex].qty = Math.max(0, inventory[itemIndex].qty + delta);

            try {
                await db.collection('inventory').doc(id).update({
                    qty: inventory[itemIndex].qty,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
                renderInventory();
                updateStats();
            } catch (error) {
                console.error(error);
            }
        }

        function showAddModal() {
            document.getElementById('modal-title').innerText = 'Add New Item';
            document.getElementById('modal-save-btn').innerText = 'Add Item';
            
            document.getElementById('modal-name').value = '';
            document.getElementById('modal-qty').value = '10';
            document.getElementById('modal-price').value = '45';
            
            document.getElementById('item-modal').classList.remove('hidden');
            document.getElementById('item-modal').classList.add('flex');
        }

        function editItem(id) {
            const item = inventory.find(i => i.id === id);
            if (!item) return;

            document.getElementById('modal-title').innerText = 'Edit Item';
            document.getElementById('modal-save-btn').innerText = 'Save Changes';
            
            document.getElementById('modal-category').value = item.category;
            document.getElementById('modal-name').value = item.name;
            document.getElementById('modal-qty').value = item.qty;
            document.getElementById('modal-unit').value = item.unit;
            document.getElementById('modal-price').value = item.price || '';

            document.getElementById('item-modal').classList.remove('hidden');
            document.getElementById('item-modal').classList.add('flex');
            
            document.getElementById('modal-save-btn').onclick = () => updateItem(id);
        }

        function getItemFormData() {
            return {
                category: document.getElementById('modal-category').value,
                name: document.getElementById('modal-name').value.trim(),
                qty: parseInt(document.getElementById('modal-qty').value) || 0,
                unit: document.getElementById('modal-unit').value,
                price: parseFloat(document.getElementById('modal-price').value) || null,
                threshold: 5
            };
        }

        async function saveNewItem() {
            if (!currentStore || !currentStore.id) {
                alert("Session error. Please login again.");
                return;
            }

            const data = getItemFormData();
            if (!data.name) {
                alert("Item name is required");
                return;
            }

            const saveBtn = document.getElementById('modal-save-btn');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = "Saving...";
            saveBtn.disabled = true;

            // Optimistic update
            const tempItem = {
                id: 'temp-' + Date.now(),
                ...data,
                storeId: currentStore.id
            };
            inventory.unshift(tempItem);
            renderInventory();
            updateStats();

            try {
                const docRef = await db.collection('inventory').add({
                    ...data,
                    storeId: currentStore.id,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Replace temp with real
                const realIndex = inventory.findIndex(i => i.id === tempItem.id);
                if (realIndex !== -1) {
                    inventory[realIndex] = { id: docRef.id, ...data };
                }

                hideModal();
                renderInventory();
                updateStats();

            } catch (error) {
                console.error("Error saving item:", error);
                inventory = inventory.filter(i => i.id !== tempItem.id);
                renderInventory();
                updateStats();
                alert("Failed to save item. Please try again.");
            } finally {
                saveBtn.innerText = originalText;
                saveBtn.disabled = false;
            }
        }

        async function updateItem(id) {
            const data = getItemFormData();
            try {
                await db.collection('inventory').doc(id).update({
                    ...data,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
                hideModal();
                await loadInventory();
            } catch (error) {
                alert("Failed to update item");
            }
        }

        function hideModal() {
            document.getElementById('item-modal').classList.remove('flex');
            document.getElementById('item-modal').classList.add('hidden');
            document.getElementById('modal-save-btn').onclick = saveNewItem;
        }

        function showProfile() {
            if (!currentStore) return;

            const modalHTML = `
                <div onclick="this.remove()" class="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center">
                    <div onclick="event.stopImmediatePropagation()" class="bg-white w-full max-w-sm mx-4 rounded-3xl p-6 text-zinc-900">
                        <div class="text-center mb-6">
                            <div class="font-semibold text-xl">${currentStore.storeName}</div>
                            <div class="text-emerald-600">${currentStore.area}</div>
                        </div>
                        
                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between py-2 border-b">
                                <span class="text-zinc-500">M-Pin</span>
                                <span class="font-mono">${currentStore.mpin}</span>
                            </div>
                        </div>

                        <div class="mt-8 grid grid-cols-2 gap-3">
                            <button onclick="logout(); this.closest('.fixed').remove()" 
                                    class="py-3 rounded-2xl border border-zinc-200 text-red-600 font-medium">Logout</button>
                            <button onclick="this.closest('.fixed').remove()" 
                                    class="py-3 rounded-2xl bg-emerald-600 text-white font-medium">Close</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function logout() {
            localStorage.removeItem('grabit_current_store');
            window.location.reload();
        }

        // ==================== INIT ====================
        function initializeApp() {
            const savedStore = localStorage.getItem('grabit_current_store');
            
            if (savedStore) {
                currentStore = JSON.parse(savedStore);
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initMainApp();
            } else {
                createPinInputs('login-pin-inputs');
            }
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
