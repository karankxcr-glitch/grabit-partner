<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grabit Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Firebase v9 compat (same as original) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-weight: 700; letter-spacing: -0.03em; }

        /* Spinner */
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Pin input */
        .mpin-input { letter-spacing: 10px; font-size: 1.8rem; font-weight: 700; font-family: monospace; }
        .mpin-input::placeholder { letter-spacing: 4px; font-size: 1.2rem; }

        /* Card hover */
        .inv-card { transition: box-shadow 0.15s ease, transform 0.15s ease; }
        .inv-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }

        /* Toast */
        #toast { transition: opacity 0.3s ease, transform 0.3s ease; }

        /* Modal backdrop */
        .modal-bg { backdrop-filter: blur(2px); }

        /* Qty button active state */
        .qty-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900">

<!-- ==================== TOAST ==================== -->

<!-- ==================== AUTH SCREEN ==================== -->

        </div>

        <!-- LOGIN CARD -->

<!-- ==================== FIREBASE + APP JS ==================== -->
<script>
// ─────────────────────────────────────────────
// FIREBASE INIT — replace with your real config
// ─────────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyAogFN9op2xp5cXSYKRNruOzOpCNdfWL-s",
    authDomain: "grabit-partner.firebaseapp.com",
    projectId: "grabit-partner",
    storageBucket: "grabit-partner.firebasestorage.app",
    messagingSenderId: "448414191552",
    appId: "1:448414191552:web:8bf554047579743b43c225"
};
firebase.initializeApp(firebaseConfig);
const db      = firebase.firestore();
const storage = firebase.storage();

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let store     = null;      // current store object
let inventory = [];        // live array
let listener  = null;      // Firestore real-time listener
let editingId = null;      // null = add mode, string = edit mode
let qtyDebounceTimers = {}; // per-item debounce for qty adjust

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type = 'success') {
    const el   = document.getElementById('toast');
    const icon = document.getElementById('toast-icon');
    const txt  = document.getElementById('toast-msg');
    txt.textContent = msg;
    icon.className  = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation';
    el.className    = el.className.replace(/bg-\w+-\d+/g, '');
    el.classList.add(type === 'success' ? 'bg-emerald-600' : 'bg-red-500');
    el.style.opacity   = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
        el.style.opacity   = '0';
        el.style.transform = 'translateX(-50%) translateY(-8px)';
    }, 2800);
}

// ─────────────────────────────────────────────
// SCREEN SWITCHER
// ─────────────────────────────────────────────
function showScreen(name) {
    document.getElementById('login-card').classList.toggle('hidden',  name !== 'login');
    document.getElementById('signup-card').classList.toggle('hidden', name !== 'signup');
}

// ─────────────────────────────────────────────
// BUTTON LOADING HELPER
// ─────────────────────────────────────────────
function setBtnLoading(btnId, labelId, loading, defaultLabel) {
    const btn   = document.getElementById(btnId);
    const label = document.getElementById(labelId);
    btn.disabled     = loading;
    label.innerHTML  = loading
        ? '<span class="spinner"></span>'
        : defaultLabel;
}

// ─────────────────────────────────────────────
// AUTH — CREATE ACCOUNT
// ─────────────────────────────────────────────
async function createAccount() {
    const name  = document.getElementById('su-name').value.trim();
    const area  = document.getElementById('su-area').value.trim();
    const mpin  = document.getElementById('su-mpin').value;
    const mpin2 = document.getElementById('su-mpin2').value;
    const photo = document.getElementById('su-photo').files[0];

    if (!name || !area)           return toast('Store name and area are required', 'error');
    if (mpin.length !== 6)        return toast('M-Pin must be exactly 6 digits', 'error');
    if (!/^\d{6}$/.test(mpin))   return toast('M-Pin must be numeric', 'error');
    if (mpin !== mpin2)           return toast('M-Pins don\'t match', 'error');

    setBtnLoading('signup-btn', 'signup-btn-label', true);
    try {
        let photoURL = null;
        if (photo) {
            const ref = storage.ref(`store_photos/${Date.now()}_${photo.name}`);
            await ref.put(photo);
            photoURL = await ref.getDownloadURL();
        }
        const docRef = await db.collection('stores').add({
            storeName: name,
            area:      area,
            mpin:      mpin,
            photoURL:  photoURL,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        store = { id: docRef.id, storeName: name, area, mpin, photoURL };
        persistStore();
        bootApp();
        toast('Account created! Welcome 🎉');
    } catch (err) {
        console.error(err);
        toast('Failed to create account. Check connection.', 'error');
    } finally {
        setBtnLoading('signup-btn', 'signup-btn-label', false, 'Create Account &amp; Login');
    }
}

// ─────────────────────────────────────────────
// AUTH — LOGIN
// ─────────────────────────────────────────────
async function loginWithMPin() {
    const mpin = document.getElementById('login-mpin').value.trim();
    if (mpin.length !== 6) return toast('Enter your 6-digit M-Pin', 'error');

    setBtnLoading('login-btn', 'login-btn-label', true);
    try {
        // FIX: removed orderBy to avoid composite index requirement
        const snap = await db.collection('stores').where('mpin', '==', mpin).limit(1).get();
        if (snap.empty) {
            toast('Invalid M-Pin. Try again.', 'error');
            document.getElementById('login-mpin').value = '';
            document.getElementById('login-mpin').focus();
            return;
        }
        const doc = snap.docs[0];
        store = { id: doc.id, ...doc.data() };
        persistStore();
        bootApp();
        toast('Logged in!');
    } catch (err) {
        console.error(err);
        toast('Login failed. Check connection.', 'error');
    } finally {
        setBtnLoading('login-btn', 'login-btn-label', false, 'Login');
    }
}

// ─────────────────────────────────────────────
// PERSIST & RESTORE SESSION
// ─────────────────────────────────────────────
function persistStore() {
    try { localStorage.setItem('grabit_store', JSON.stringify(store)); } catch(_) {}
}
function restoreStore() {
    try {
        const s = localStorage.getItem('grabit_store');
        return s ? JSON.parse(s) : null;
    } catch(_) { return null; }
}

// ─────────────────────────────────────────────
// BOOT — show main app
// ─────────────────────────────────────────────
function bootApp() {
    if (!store) return;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('hdr-store').textContent = store.storeName;
    document.getElementById('hdr-area').textContent  = store.area;
    startInventoryListener();
}

// ─────────────────────────────────────────────
// REAL-TIME INVENTORY LISTENER
// FIX: no orderBy = no composite index crash
// Sorting is done client-side instead
// ─────────────────────────────────────────────
function startInventoryListener() {
    if (listener) listener(); // unsubscribe old listener
    listener = db.collection('inventory')
        .where('storeId', '==', store.id)
        .onSnapshot(snap => {
            inventory = [];
            snap.forEach(doc => inventory.push({ id: doc.id, ...doc.data() }));
            // Sort client-side: newest first by lastUpdated
            inventory.sort((a, b) => {
                const ta = a.lastUpdated?.toMillis?.() || 0;
                const tb = b.lastUpdated?.toMillis?.() || 0;
                return tb - ta;
            });
            renderInventory();
            updateStats();
        }, err => {
            console.error('Listener error:', err);
            toast('Error loading inventory', 'error');
        });
}

// ─────────────────────────────────────────────
// RENDER INVENTORY
// ─────────────────────────────────────────────
function renderInventory() {
    const grid    = document.getElementById('inv-grid');
    const empty   = document.getElementById('empty-state');
    const search  = document.getElementById('search-box').value.toLowerCase().trim();

    let items = inventory;
    if (search) {
        items = items.filter(i =>
            i.name?.toLowerCase().includes(search) ||
            i.category?.toLowerCase().includes(search)
        );
    }

    grid.innerHTML = '';
    if (items.length === 0) {
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');

    items.forEach(item => {
        const thresh = item.threshold ?? 5;
        const isLow  = item.qty <= thresh;
        const card   = document.createElement('div');
        card.className = `inv-card bg-white border ${isLow ? 'border-red-300' : 'border-zinc-100'} rounded-2xl p-4 cursor-default`;

        const photo = item.photoURL
            ? `<img src="${item.photoURL}" loading="lazy" class="w-full h-28 object-cover rounded-xl mb-3 bg-zinc-100">`
            : '';

        card.innerHTML = `
            ${photo}
            <div class="flex justify-between items-start mb-2">
                <div class="flex-1 pr-1">
                    <div class="font-semibold text-sm leading-tight">${esc(item.name)}</div>
                    <div class="text-xs text-zinc-400 mt-0.5">${esc(item.category)}</div>
                </div>
                ${isLow ? `<span class="shrink-0 px-1.5 py-0.5 bg-red-100 text-red-600 text-[10px] font-bold rounded-full">LOW</span>` : ''}
            </div>
            <div class="flex items-baseline gap-1 mt-3">
                <span class="text-3xl font-bold text-emerald-700">${item.qty}</span>
                <span class="text-xs text-zinc-400">${esc(item.unit)}</span>
            </div>
            ${item.price ? `<div class="text-xs text-zinc-400 mt-1">₹${item.price}</div>` : ''}
            <div class="flex justify-between items-center mt-3 pt-3 border-t border-zinc-50">
                <div class="flex items-center gap-1">
                    <button onclick="adjustQty('${item.id}', -1)"
                        class="qty-btn w-8 h-8 bg-zinc-100 hover:bg-zinc-200 rounded-xl flex items-center justify-center font-semibold text-lg transition text-zinc-600">−</button>
                    <button onclick="adjustQty('${item.id}', 1)"
                        class="qty-btn w-8 h-8 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 rounded-xl flex items-center justify-center font-semibold text-lg transition">+</button>
                </div>
                <button onclick="openEditModal('${item.id}')"
                    class="text-xs text-zinc-400 hover:text-emerald-600 font-medium px-2 py-1 hover:bg-emerald-50 rounded-xl transition">Edit</button>
            </div>
        `;
        grid.appendChild(card);
    });
}

// ─────────────────────────────────────────────
// XSS-safe escape
// ─────────────────────────────────────────────
function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────
function updateStats() {
    document.getElementById('stat-total').textContent = inventory.length;
    const low = inventory.filter(i => i.qty <= (i.threshold ?? 5)).length;
    document.getElementById('stat-low').textContent   = low;
    document.getElementById('stat-time').textContent  = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
}

// ─────────────────────────────────────────────
// ADJUST QTY — debounced to prevent race conditions
// ─────────────────────────────────────────────
function adjustQty(id, delta) {
    const idx = inventory.findIndex(i => i.id === id);
    if (idx === -1) return;

    inventory[idx].qty = Math.max(0, (inventory[idx].qty || 0) + delta);
    renderInventory(); // instant UI update

    // Debounce the Firestore write — wait 600ms after last click
    clearTimeout(qtyDebounceTimers[id]);
    qtyDebounceTimers[id] = setTimeout(async () => {
        try {
            await db.collection('inventory').doc(id).update({
                qty:         inventory[idx].qty,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch(err) {
            console.error(err);
            toast('Sync error — changes may not save', 'error');
        }
    }, 600);
}

// ─────────────────────────────────────────────
// MODAL — OPEN (ADD)
// ─────────────────────────────────────────────
function openModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add New Item';
    document.getElementById('modal-save-label').textContent = 'Add Item';
    document.getElementById('m-cat').value   = 'Staples';
    document.getElementById('m-name').value  = '';
    document.getElementById('m-qty').value   = '10';
    document.getElementById('m-unit').value  = 'pcs';
    document.getElementById('m-price').value = '';
    document.getElementById('m-thresh').value = '5';
    document.getElementById('m-photo').value = '';
    document.getElementById('item-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('m-name').focus(), 100);
}

// ─────────────────────────────────────────────
// MODAL — OPEN (EDIT)
// ─────────────────────────────────────────────
function openEditModal(id) {
    const item = inventory.find(i => i.id === id);
    if (!item) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Item';
    document.getElementById('modal-save-label').textContent = 'Save Changes';
    document.getElementById('m-cat').value    = item.category || 'Other';
    document.getElementById('m-name').value   = item.name || '';
    document.getElementById('m-qty').value    = item.qty ?? 0;
    document.getElementById('m-unit').value   = item.unit || 'pcs';
    document.getElementById('m-price').value  = item.price || '';
    document.getElementById('m-thresh').value = item.threshold ?? 5;
    document.getElementById('m-photo').value  = '';
    document.getElementById('item-modal').classList.remove('hidden');
}

// ─────────────────────────────────────────────
// MODAL — CLOSE
// ─────────────────────────────────────────────
function closeModal() {
    document.getElementById('item-modal').classList.add('hidden');
    editingId = null;
}

// ─────────────────────────────────────────────
// SAVE ITEM (add or edit)
// ─────────────────────────────────────────────
async function saveItem() {
    const name   = document.getElementById('m-name').value.trim();
    if (!name) return toast('Item name is required', 'error');

    const data = {
        category:  document.getElementById('m-cat').value,
        name:      name,
        qty:       parseInt(document.getElementById('m-qty').value) || 0,
        unit:      document.getElementById('m-unit').value,
        price:     parseFloat(document.getElementById('m-price').value) || null,
        threshold: parseInt(document.getElementById('m-thresh').value) || 5,
        storeId:   store.id,
        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
    };

    const photoFile = document.getElementById('m-photo').files[0];

    const saveBtn = document.getElementById('modal-save-btn');
    const lblEl   = document.getElementById('modal-save-label');
    saveBtn.disabled  = true;
    lblEl.innerHTML   = '<span class="spinner"></span>';

    try {
        // Upload photo first if provided
        if (photoFile) {
            const ref = storage.ref(`item_photos/${Date.now()}_${photoFile.name}`);
            await ref.put(photoFile);
            data.photoURL = await ref.getDownloadURL();
        }

        if (editingId) {
            // EDIT: update existing
            await db.collection('inventory').doc(editingId).update(data);
            toast('Item updated');
        } else {
            // ADD: create new
            await db.collection('inventory').add(data);
            toast('Item added');
        }
        closeModal();
        // Real-time listener will auto-refresh the list
    } catch (err) {
        console.error(err);
        toast('Failed to save. Check connection.', 'error');
    } finally {
        saveBtn.disabled = false;
        lblEl.textContent = editingId ? 'Save Changes' : 'Add Item';
    }
}

// ─────────────────────────────────────────────
// PROFILE / LOGOUT
// ─────────────────────────────────────────────
function showProfile() {
    if (!store) return;
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/50 z-[60] flex items-center justify-center px-4';
    overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
    overlay.innerHTML = `
        <div class="bg-white rounded-3xl p-7 w-full max-w-sm shadow-2xl" onclick="event.stopPropagation()">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fa-solid fa-store text-emerald-600 text-2xl"></i>
                </div>
                <div class="font-bold text-xl">${esc(store.storeName)}</div>
                <div class="text-emerald-600 text-sm mt-0.5">${esc(store.area)}</div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="logout()" class="py-3 rounded-2xl border border-red-200 text-red-600 font-medium text-sm hover:bg-red-50 transition">
                    <i class="fa-solid fa-right-from-bracket mr-1.5"></i>Logout
                </button>
                <button onclick="this.closest('.fixed').remove()" class="py-3 rounded-2xl bg-emerald-600 text-white font-semibold text-sm hover:bg-emerald-700 transition">
                    Close
                </button>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);
}

function logout() {
    if (listener) listener();
    store = null;
    inventory = [];
    try { localStorage.removeItem('grabit_store'); } catch(_) {}
    // clean up any open overlays
    document.querySelectorAll('.fixed.inset-0').forEach(el => el.remove());
    document.getElementById('main-app').classList.add('hidden');
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('login-mpin').value = '';
    showScreen('login');
    toast('Logged out');
}

// ─────────────────────────────────────────────
// INIT ON PAGE LOAD
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    const saved = restoreStore();
    if (saved) {
        store = saved;
        bootApp();
    }
});
</script>
