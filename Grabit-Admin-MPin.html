<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabit Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-weight: 700; letter-spacing: -0.03em; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-zinc-50">
    <!-- Toast -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-[200] hidden px-5 py-3 rounded-2xl text-white text-sm font-medium shadow-xl flex items-center gap-2"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <div class="flex justify-center mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-emerald-600 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-bolt text-white text-2xl"></i>
                    </div>
                    <span class="logo-font text-4xl text-emerald-700">Grabit</span>
                    <span class="text-emerald-600 font-semibold text-xl">Admin</span>
                </div>
            </div>

            <!-- Login -->
            <div id="login-card" class="bg-white rounded-3xl shadow p-8 border">
                <h2 class="text-xl font-semibold mb-1">Admin Login</h2>
                <p class="text-zinc-500 text-sm mb-6">Enter your 6-digit M-Pin</p>
                
                <input id="login-mpin" type="password" maxlength="6" placeholder="••••••"
                       class="w-full text-center border border-zinc-200 focus:border-emerald-500 rounded-2xl py-4 mb-6 text-2xl tracking-[10px]">
                
                <button onclick="loginWithMPin()" id="login-btn"
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 rounded-2xl flex justify-center items-center gap-2">
                    <span id="login-btn-text">Login</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Admin App -->
    <div id="main-app" class="hidden min-h-screen bg-zinc-50 pb-20">
        <div class="bg-white border-b sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-emerald-600 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-bolt text-white"></i>
                    </div>
                    <span class="logo-font text-2xl text-emerald-700">Grabit</span>
                    <span class="text-emerald-600 font-semibold">Admin</span>
                </div>
                <button onclick="logout()" class="text-sm text-red-600 hover:text-red-700 font-medium">Logout</button>
            </div>
        </div>

        <div class="max-w-6xl mx-auto px-6 pt-6">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="bg-white border rounded-2xl p-5">
                    <div class="text-sm text-zinc-500">Total Stores</div>
                    <div id="stat-stores" class="text-4xl font-bold text-emerald-700 mt-1">0</div>
                </div>
                <div class="bg-white border rounded-2xl p-5">
                    <div class="text-sm text-zinc-500">Total Items</div>
                    <div id="stat-items" class="text-4xl font-bold text-emerald-700 mt-1">0</div>
                </div>
                <div class="bg-white border rounded-2xl p-5">
                    <div class="text-sm text-zinc-500">Low Stock Items</div>
                    <div id="stat-low" class="text-4xl font-bold text-red-500 mt-1">0</div>
                </div>
            </div>

            <!-- Stores Section -->
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Partnered Stores</h2>
                <input id="store-search" type="text" placeholder="Search stores..." oninput="renderStores()"
                       class="border px-4 py-2 rounded-2xl text-sm w-64">
            </div>

            <div id="stores-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <!-- Store Details Modal -->
    <div id="store-modal" onclick="if(event.target.id==='store-modal') closeStoreModal()" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-white w-full max-w-4xl mx-4 rounded-3xl p-6 max-h-[85vh] overflow-auto">
            
            <!-- Partner Details -->
            <div class="mb-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 id="modal-store-name" class="text-2xl font-semibold"></h3>
                        <p id="modal-store-area" class="text-emerald-600"></p>
                    </div>
                    <button onclick="closeStoreModal()" class="text-3xl">×</button>
                </div>

                <div class="bg-zinc-50 border rounded-2xl p-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-y-3 text-sm">
                        <div>
                            <span class="text-zinc-500">Owner Name:</span><br>
                            <span id="modal-owner-name" class="font-medium"></span>
                        </div>
                        <div>
                            <span class="text-zinc-500">Phone Number:</span><br>
                            <span id="modal-phone" class="font-medium"></span>
                        </div>
                        <div>
                            <span class="text-zinc-500">Store Name:</span><br>
                            <span id="modal-store-name2" class="font-medium"></span>
                        </div>
                        <div>
                            <span class="text-zinc-500">Area:</span><br>
                            <span id="modal-area" class="font-medium"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Inventory Section -->
            <div>
                <h4 class="font-semibold mb-3">Inventory</h4>
                <div id="modal-inventory-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAogFN9op2xp5cXSYKRNruOzOpCNdfWL-s",
            authDomain: "grabit-partner.firebaseapp.com",
            projectId: "grabit-partner",
            storageBucket: "grabit-partner.firebasestorage.app",
            messagingSenderId: "448414191552",
            appId: "1:448414191552:web:8bf554047579743b43c225"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentAdmin = null;
        let allStores = [];
        let allInventory = [];

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerHTML = msg;
            toast.className = `fixed top-4 left-1/2 -translate-x-1/2 z-[200] px-5 py-3 rounded-2xl text-white text-sm font-medium shadow-xl flex items-center gap-2 ${isError ? 'bg-red-600' : 'bg-emerald-600'}`;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        async function loginWithMPin() {
            const mpin = document.getElementById('login-mpin').value.trim();
            if (mpin.length !== 6) return showToast("Enter 6-digit M-Pin", true);

            const btn = document.getElementById('login-btn');
            btn.innerHTML = `<span class="spinner"></span> Logging in...`;
            btn.disabled = true;

            try {
                if (mpin === "123456") {
                    currentAdmin = { id: "admin", name: "Grabit Admin" };
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    loadAllData();
                } else {
                    showToast("Invalid Admin M-Pin", true);
                }
            } catch (err) {
                showToast("Login failed", true);
            } finally {
                btn.innerHTML = `Login`;
                btn.disabled = false;
            }
        }

        async function loadAllData() {
            try {
                const storesSnap = await db.collection('stores').get();
                allStores = [];
                storesSnap.forEach(doc => allStores.push({ id: doc.id, ...doc.data() }));

                const invSnap = await db.collection('inventory').get();
                allInventory = [];
                invSnap.forEach(doc => allInventory.push({ id: doc.id, ...doc.data() }));

                renderStats();
                renderStores();
            } catch (err) {
                showToast("Failed to load data", true);
            }
        }

        function renderStats() {
            document.getElementById('stat-stores').innerText = allStores.length;
            document.getElementById('stat-items').innerText = allInventory.length;

            const lowStock = allInventory.filter(item => item.qty <= (item.threshold || 5)).length;
            document.getElementById('stat-low').innerText = lowStock;
        }

        function renderStores() {
            const grid = document.getElementById('stores-grid');
            const search = document.getElementById('store-search').value.toLowerCase();
            grid.innerHTML = '';

            let filtered = allStores;
            if (search) {
                filtered = allStores.filter(s => 
                    s.storeName.toLowerCase().includes(search) || 
                    s.area.toLowerCase().includes(search) ||
                    (s.ownerName && s.ownerName.toLowerCase().includes(search))
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-8 text-zinc-400">No stores found</div>`;
                return;
            }

            filtered.forEach(store => {
                const storeItems = allInventory.filter(i => i.storeId === store.id);
                const lowCount = storeItems.filter(i => i.qty <= (i.threshold || 5)).length;

                const card = document.createElement('div');
                card.className = `bg-white border rounded-2xl p-5 cursor-pointer hover:border-emerald-300 transition`;
                card.onclick = () => openStoreModal(store);

                card.innerHTML = `
                    <div class="flex justify-between">
                        <div>
                            <div class="font-semibold text-lg">${store.storeName}</div>
                            <div class="text-emerald-600 text-sm">${store.area}</div>
                            <div class="text-xs text-zinc-500 mt-1">${store.ownerName || 'N/A'}</div>
                        </div>
                        ${lowCount > 0 ? `<span class="px-2.5 py-0.5 bg-red-100 text-red-600 text-xs rounded-full self-start">${lowCount} low</span>` : ''}
                    </div>
                    <div class="mt-4 text-sm text-zinc-500">
                        ${storeItems.length} items in inventory
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openStoreModal(store) {
            // Partner Details
            document.getElementById('modal-store-name').innerText = store.storeName;
            document.getElementById('modal-store-area').innerText = store.area;
            document.getElementById('modal-owner-name').innerText = store.ownerName || 'Not provided';
            document.getElementById('modal-phone').innerText = store.phone || 'Not provided';
            document.getElementById('modal-store-name2').innerText = store.storeName;
            document.getElementById('modal-area').innerText = store.area;

            // Inventory
            const container = document.getElementById('modal-inventory-grid');
            container.innerHTML = '';

            const storeItems = allInventory.filter(i => i.storeId === store.id);

            if (storeItems.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-8 text-zinc-400">No items in this store yet.</div>`;
            } else {
                storeItems.forEach(item => {
                    const isLow = item.qty <= (item.threshold || 5);
                    const div = document.createElement('div');
                    div.className = `border ${isLow ? 'border-red-300' : 'border-zinc-100'} rounded-2xl p-4`;
                    div.innerHTML = `
                        <div class="flex justify-between">
                            <div>
                                <div class="font-medium">${item.name}</div>
                                <div class="text-xs text-zinc-500">${item.category}</div>
                            </div>
                            ${isLow ? `<span class="text-red-500 text-xs">LOW</span>` : ''}
                        </div>
                        <div class="mt-2 text-2xl font-bold text-emerald-700">${item.qty} <span class="text-xs text-zinc-500">${item.unit}</span></div>
                    `;
                    container.appendChild(div);
                });
            }

            document.getElementById('store-modal').classList.remove('hidden');
            document.getElementById('store-modal').classList.add('flex');
        }

        function closeStoreModal() {
            const modal = document.getElementById('store-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function logout() {
            localStorage.removeItem('grabit_admin');
            window.location.reload();
        }
    </script>
</body>
</html>
```
